<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="title" class="main-title">Understanding CSS Specificity</h1>
    <p class="text">This is paragraph with class styleing.</p>
    <p id="unique-text" class="text">
        This is a paragraph with an ID and class.
    </p>
    <p style="color: orange;">This is a paragraph with inline styles.</p>
</body>
</html>
