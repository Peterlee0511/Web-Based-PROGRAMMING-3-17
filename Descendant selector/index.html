<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Descendant Selector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Main Heading</h2>
        <p>This is a paragraph inside the container.</p>
        <div class="nested">
            <p>This is a nested paragraph inside the nested div.</p>
        </div>
    </div>
    <p>This is a paragraph outside the container.</p>
</body>
</html>
